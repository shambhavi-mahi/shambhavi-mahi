<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="68%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#161B22"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1500" height="500" fill="#0D1117"/>
  <rect width="1500" height="500" fill="url(#dots)" opacity="0.5"/>
  <rect width="1500" height="500" fill="url(#glow)"/>
  <rect x="1" y="1" width="1498" height="498" fill="none" stroke="#21262D" stroke-width="2"/>

  <!-- decorative code glyph, low opacity -->
  <text x="1170" y="330" font-family="Menlo, Consolas, monospace" font-size="180" fill="#58A6FF" opacity="0.07">&lt;/&gt;</text>

  <!-- text content -->
  <text x="120" y="215" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="58" font-weight="600" fill="#F0F6FC" letter-spacing="-0.5">Shambhavi Mahi</text>
  <text x="120" y="260" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500" fill="#79C0FF">Software Engineer</text>
  <text x="120" y="298" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="400" fill="#8B949E">Building software that solves real problems.</text>

  <!-- accent cursor -->
  <rect x="546" y="278" width="3" height="24" fill="#58A6FF"/>
</svg>
